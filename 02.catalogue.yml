---
- name: configure catalogue component
  hosts: catalogue
  become: true
  tasks:
    - name: disable default nodejs
      ansible.builtin.command: dnf module disable nodejs -y
    - name: enable default nodejs:20 -y
      ansible.builtin.command: dnf module enable nodejs:20 -y
    - name: install nodejs
      ansible.builtin.dnf:
        name: nodejs
        state: present
    - name: create app directory
      ansible.builtin.file:
        path: /app
        state: directory
    - name: create roboshop system user
      ansible.builtin.user:
        name: roboshop
        shell: /sbin/nologin
        system: true
        home: /app
    - name: download catalogue code
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip
    - name: install npm dependencies
      ansible.builtin.command: npm install
      args:
        chdir: /app
    - name: create systemd service file
      ansible.builtin.copy:
        dest: /etc/systemd/system/catalogue.service
        content: |
          [Unit]
          Description=Catalogue Service
          After=network.target

          [Service]
          User=roboshop
          WorkingDirectory=/app
          ExecStart=/bin/node /app/server.js
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: reload systemd
      ansible.builtin.command: systemctl daemon-reload

    - name: enable and start catalogue
      ansible.builtin.service:
        name: catalogue
        state: started
        enabled: yes

    - name: copy mongodb repo
      ansible.builtin.copy:
        src: mongo.repo
        path:  /etc/yum.repos.d/mongo.repo 

    - name: install mongodb-mongosh
      ansible.builtin.dnf:
         name: mongodb-mongosh -y
         state: present 

