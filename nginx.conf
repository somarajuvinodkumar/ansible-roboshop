http {
    ...
    include /etc/nginx/conf.d/*.conf;

    server {
        listen 80;
        listen [::]:80;
        server_name _;
        root /usr/share/nginx/html;

        include /etc/nginx/default.d/*.conf;

        error_page 404 /404.html;
        location = /404.html { }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html { }

        location /api/catalogue/ {
            proxy_pass http://catalogue.somaraju.online:8080/;
        }

        location /api/user/ {
            proxy_pass http://user.somaraju.online:8080/;
        }

        location /api/cart/ {
            proxy_pass http://cart.somaraju.online:8080/;
        }

        location /api/shipping/ {
            proxy_pass http://shipping.somaraju.online:8080/;
        }

        location /api/payment/ {
            proxy_pass http://payment.somaraju.online:8080/;
        }

        location /health {
            stub_status on;
            access_log off;
        }
    }
}